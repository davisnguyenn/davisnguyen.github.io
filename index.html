<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    header {
      padding: 60px 20px;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
    }
    h1 {
      font-size: 3em;
      margin: 0;
    }
    p {
      font-size: 1.2em;
    }
    section {
      padding: 40px 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 400px;
    }
    footer {
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
    a {
      color: #60a5fa;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Welcome to my website 🚀</p>
</header>

<section>
  <h2>About Me</h2>
  <div class="card">
    <p>Write a short intro about yourself here.</p>
  </div>
</section>

<section>
  <h2>Projects</h2>
  <div class="card">
    <p>Project 1 description</p>
  </div>
  <div class="card">
    <p>Project 2 description</p>
  </div>
</section>

<section>
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
  </div>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>]
